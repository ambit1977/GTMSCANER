<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GTM Scanner</title>
  <style>
    * { box-sizing: border-box; }
    body {
      width: 420px;
      min-height: 320px;
      max-height: 560px;
      margin: 0;
      padding: 12px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #f8f9fa;
    }
    h1 {
      margin: 0 0 12px 0;
      font-size: 16px;
      font-weight: 600;
      color: #1967d2;
    }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    button {
      padding: 8px 14px;
      font-size: 13px;
      border: none;
      border-radius: 6px;
      background: #1967d2;
      color: #fff;
      cursor: pointer;
    }
    button:hover { background: #1557b0; }
    button:disabled { background: #9ca3af; cursor: not-allowed; }
    .status {
      font-size: 12px;
      color: #6b7280;
    }
    .report {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .report-header {
      padding: 10px 12px;
      background: #eff6ff;
      border-bottom: 1px solid #e5e7eb;
      font-weight: 600;
      color: #1e40af;
    }
    .report-header .version { font-weight: 400; opacity: 0.9; }
    .summary-bar {
      padding: 8px 12px;
      font-size: 12px;
      color: #4b5563;
      background: #f9fafb;
      border-bottom: 1px solid #f3f4f6;
    }
    .summary-bar .count-sub {
      font-size: 11px;
      color: #9ca3af;
    }
    .count-note {
      margin: 0;
      padding: 6px 12px 10px;
      font-size: 11px;
      color: #6b7280;
      line-height: 1.4;
      background: #fff;
      border-bottom: 1px solid #f3f4f6;
    }
    .section {
      padding: 10px 12px;
      border-bottom: 1px solid #f3f4f6;
    }
    .section:last-child { border-bottom: none; }
    .section-title {
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
      font-size: 12px;
    }
    .section ul {
      margin: 0;
      padding-left: 18px;
      line-height: 1.5;
    }
    .section li { margin-bottom: 2px; }
    .summary-list { list-style: none; padding-left: 0; }
    .summary-list li { display: flex; justify-content: space-between; gap: 8px; }
    .summary-list .label { flex: 1; }
    .summary-list .count { color: #6b7280; font-variant-numeric: tabular-nums; }
    .named-vars { list-style: none; padding-left: 0; font-size: 12px; }
    .named-vars code { background: #f3f4f6; padding: 1px 4px; border-radius: 3px; }
    .named-vars .var-type { color: #6b7280; margin-left: 4px; }
    .named-vars .more { font-style: italic; color: #9ca3af; }
    .var-builtin { font-size: 10px; color: #059669; background: #d1fae5; padding: 1px 5px; border-radius: 3px; margin-left: 4px; }
    .zone-note { margin: 0 0 8px 0; font-size: 11px; color: #6b7280; }
    .zone-list { list-style: none; padding-left: 0; }
    .zone-item { padding: 8px 0; border-bottom: 1px solid #f3f4f6; }
    .zone-item:last-child { border-bottom: none; }
    .zone-name { font-weight: 600; color: #1e40af; display: block; margin-bottom: 4px; }
    .zone-details { margin: 0; padding-left: 18px; font-size: 12px; color: #4b5563; }
    .trigger-type-list { list-style: none; padding-left: 0; }
    .trigger-type-item { margin-bottom: 6px; }
    .trigger-type-btn {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      text-align: left;
      padding: 8px 10px;
      border: 1px solid #e5e7eb;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      font-size: 13px;
    }
    .trigger-type-btn:hover { background: #f3f4f6; }
    .trigger-type-label { font-weight: 600; color: #111; }
    .trigger-type-count { color: #6b7280; font-variant-numeric: tabular-nums; }
    .trigger-type-drilldown { padding: 10px; margin-top: 4px; border-left: 3px solid #1967d2; background: #f8fafc; border-radius: 0 6px 6px 0; font-size: 12px; max-height: 280px; overflow-y: auto; }
    .trigger-detail-block { padding: 8px 0; border-bottom: 1px solid #e5e7eb; }
    .trigger-detail-block:last-child { border-bottom: none; }
    .trigger-detail-title { font-weight: 600; color: #374151; display: block; margin-bottom: 4px; }
    .trigger-conditions { margin: 0 0 6px 0; padding-left: 18px; }
    .trigger-firing-tags { margin: 0; color: #1e40af; font-weight: 500; }
    .trigger-firing-tags.empty { color: #6b7280; font-weight: 400; }
    .speed-section { background: #f9fafb; }
    .speed-summary {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 6px;
    }
    .speed-size { font-variant-numeric: tabular-nums; }
    .speed-label { font-weight: 600; }
    .impact-light .speed-label { color: #059669; }
    .impact-medium .speed-label { color: #d97706; }
    .impact-heavy .speed-summary { background: #fef3c7; }
    .impact-heavy .speed-label { color: #b45309; }
    .impact-very-heavy .speed-summary { background: #fee2e2; }
    .impact-very-heavy .speed-label { color: #b91c1c; }
    .speed-details { margin: 0; padding-left: 18px; font-size: 12px; color: #6b7280; }
    .empty { color: #9ca3af; font-style: italic; }
    .other-scripts { background: #f8fafc; }
    .other-scripts-note { font-size: 12px; color: #6b7280; margin-bottom: 8px; }
    .other-scripts-list { list-style: none; padding-left: 0; }
    .other-scripts-list li { padding: 4px 0; font-size: 12px; }
    .other-scripts-kind { font-weight: 500; color: #374151; }
    .other-scripts-list code { background: #e5e7eb; padding: 2px 6px; border-radius: 3px; margin-left: 4px; }
    .error {
      padding: 12px;
      background: #fef2f2;
      color: #b91c1c;
      border-radius: 6px;
      margin-bottom: 8px;
    }
    .scroll {
      overflow-y: auto;
      max-height: 400px;
    }
  </style>
</head>
<body>
  <h1>GTM Scanner</h1>
  <div class="toolbar">
    <button id="scanBtn">このページをスキャン</button>
    <span class="status" id="status"></span>
  </div>
  <div id="result"></div>
  <script src="gtm-parser.js"></script>
  <script src="popup.js"></script>
</body>
</html>
